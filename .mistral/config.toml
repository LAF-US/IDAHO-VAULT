# Mistral Vibe — IDAHO-VAULT project configuration
# Docs: https://docs.mistral.ai/mistral-vibe/terminal/configuration
# Governance: CONSTITUTION.md
# Conventions: VAULT-CONVENTIONS.md

# --- Provider / Model ---
# Uncomment and set the active model preset.
# For API mode, set MISTRAL_API_KEY in environment (see .mistral/MISTRAL.md).
# For local mode: Ollama serves on port 11434 (not 8080).
# Start Ollama, then select "local" via /model in vibe-acp.

# [model]
# preset = "mistral-small"   # API mode — Mistral Small 4 (119B MoE)
# preset = "local"           # Local mode — Devstral via Ollama

# --- Local server (Ollama) ---
# Ollama OpenAI-compatible endpoint: http://localhost:11434/v1
# Model tag pulled: devstral (Devstral Small 2, 24B)
# [local]
# port = 11434
# base_url = "http://localhost:11434/v1"
# model = "devstral"

# --- Tool permissions ---
# Approve tool execution per-tool or globally.
# [tools]
# approval_mode = "approve"  # "approve" | "auto"

# --- UI ---
# [ui]
# theme = "default"
