name: Cross-Platform Smoke

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.13"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: actions/setup-python@c8813ba1bc76ebf779b911ad8ffccbf2e449cb48
        with:
          python-version: ${{ matrix.python }}

      - name: Verify startup surfaces exist
        shell: bash
        run: |
          test -f "AGENTS.md"
          test -f "!/WAKEUP.md"
          test -f "!/README.md"
          test -f "swarm.json"
          test -f "start_SPARKSEED.py"

      - name: Validate swarm.json
        run: python -m json.tool swarm.json > /tmp/swarm.pretty.json

      - name: Bootstrap entrypoint help
        run: python start_SPARKSEED.py --help

      - name: MESHNETWEB portability check (report)
        run: python .github/scripts/meshnetweb_portability_check.py

      - name: MESHNETWEB portability check (strict on PR)
        if: github.event_name == 'pull_request'
        run: python .github/scripts/meshnetweb_portability_check.py --strict
