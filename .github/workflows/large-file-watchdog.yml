name: Large File Watchdog

on:
  schedule:
    - cron: '0 11 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.11'

      - name: Build report
        id: report
        run: |
          python .github/scripts/large_file_watchdog.py --report-path large-file-watchdog.md

      - name: Publish summary
        run: cat large-file-watchdog.md >> "$GITHUB_STEP_SUMMARY"

      - name: Open or update issue when findings exist
        if: steps.report.outputs.has_findings == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=$(gh issue list --state open --search "\"[Large File Watchdog] Weekly report\" in:title" --json number --jq '.[0].number')
          if [ -z "$ISSUE_NUMBER" ] || [ "$ISSUE_NUMBER" = "null" ]; then
            gh issue create \
              --title "[Large File Watchdog] Weekly report" \
              --body-file large-file-watchdog.md
          else
            gh issue comment "$ISSUE_NUMBER" --body-file large-file-watchdog.md
          fi
