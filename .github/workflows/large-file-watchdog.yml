name: Large File Watchdog

on:
  schedule:
    - cron: '0 11 * * 1'
  contents: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      - name: Build report
        id: report
        run: |
          python .github/scripts/large_file_watchdog.py --report-path large-file-watchdog.md

      - name: Publish summary
        run: cat large-file-watchdog.md >> "$GITHUB_STEP_SUMMARY"

      - name: Sync recurring issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/issue_reconciler.py \
            --title "[Large File Watchdog] Weekly report" \
            --body-file large-file-watchdog.md \
            --has-findings "${{ steps.report.outputs.has_findings }}" \
            --resolved-comment "Resolved automatically: the latest large-file watchdog run found no current findings."
