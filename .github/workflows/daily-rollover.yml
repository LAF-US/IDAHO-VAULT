name: Daily To-Do Rollover

on:
  schedule:
    - cron: '0 10 * * *'  # 4 AM MT
  workflow_dispatch:

jobs:
  rollover:
    name: Roll over incomplete to-dos
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout vault
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Set up Python
        uses: actions/setup-python@c8813ba1bc76ebf779b911ad8ffccbf2e449cb48
        with:
          python-version: '3.11'

      - name: Run daily rollover
        run: |
          DATE="$(TZ=America/Boise date +%Y-%m-%d)"
          python3 .github/scripts/daily_rollover.py --date "$DATE"

      - name: Commit and Push Changes
        run: |
          TARGET_DATE="$(TZ=America/Boise date +%Y-%m-%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${TARGET_DATE}.md" "TO DO LIST.md"
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "rollover: carry incomplete to-dos to ${TARGET_DATE}"
          git push origin main