name: Secret Pattern Policy

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Check changed files for secret patterns
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --name-only -z --diff-filter=ACMR \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.event.pull_request.head.sha }}" |
              python .github/scripts/check_secret_patterns.py --paths-from-stdin
          else
            before="${{ github.event.before }}"
            after="${{ github.sha }}"
            if [[ "$before" == "0000000000000000000000000000000000000000" ]]; then
              git ls-tree -r -z --name-only "$after" |
                python .github/scripts/check_secret_patterns.py --paths-from-stdin
            else
              git diff --name-only -z --diff-filter=ACMR "$before" "$after" |
                python .github/scripts/check_secret_patterns.py --paths-from-stdin
            fi
