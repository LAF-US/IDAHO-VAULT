name: Agent Review Gate

# Promotes low-risk PRs from agent-review-pending -> auto-merge only after the
# shared review-state evaluator says the grace window has elapsed and no live
# GitHub review/thread block remains.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      grace_minutes:
        description: 'Minimum minutes a PR must wait before promoting to auto-merge'
        required: false
        default: '30'

permissions:
  pull-requests: write
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted workflow surfaces
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Promote eligible low-risk PRs to auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GRACE_MINUTES: ${{ github.event.inputs.grace_minutes || '30' }}
        run: |
          python3 .github/scripts/review_feedback_loop.py \
            promote-ready \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            --grace-minutes "$GRACE_MINUTES"
