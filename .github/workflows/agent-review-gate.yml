name: Agent Review Gate

# Periodically re-derives open PR review state from GitHub truth so drift can be
# corrected without waiting for a fresh webhook event. Eligible low-risk PRs are
# also re-promoted / re-armed for auto-merge here if the event-driven path was
# missed.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      grace_minutes:
        description: 'Minimum minutes a PR must wait before promoting to auto-merge'
        required: false
        default: '30'

permissions:
  pull-requests: write
  contents: read
  issues: write

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted workflow surfaces
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Reconcile open PR review state
        id: reconcile
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GRACE_MINUTES: ${{ github.event.inputs.grace_minutes || '30' }}
        run: |
          python3 .github/scripts/review_feedback_loop.py \
            reconcile-open-prs \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            --grace-minutes "$GRACE_MINUTES" > pr-loop-reconcile.json
          cat pr-loop-reconcile.json

      - name: Build PR loop watchdog report
        id: watchdog
        run: |
          python3 .github/scripts/pr_loop_watchdog.py \
            --report-json pr-loop-reconcile.json \
            --report-path pr-loop-watchdog.md

      - name: Publish PR loop summary
        run: cat pr-loop-watchdog.md >> "$GITHUB_STEP_SUMMARY"

      - name: Sync PR loop watchdog issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/scripts/issue_reconciler.py \
            --title "[PR Loop Watchdog] Reconciliation report" \
            --body-file pr-loop-watchdog.md \
            --has-findings "${{ steps.watchdog.outputs.has_findings }}" \
            --resolved-comment "Resolved automatically: the latest PR reconciliation found no unresolved blockers."
