name: Linear Webhook Router

# Receives Linear webhook events forwarded as repository_dispatch payloads.
#
# Linear does not call GitHub Actions directly. A small forwarder function
# (Cloud Function, Vercel edge, or similar) must:
#   1. Receive the Linear webhook POST
#   2. Validate the Linear-Signature HMAC-SHA256 header
#   3. Forward the payload to this workflow via the GitHub repository_dispatch API:
#      POST /repos/loganfinney27/IDAHO-VAULT/dispatches
#      { "event_type": "linear-webhook", "client_payload": { ...linear event... } }
#
# The gateway script (linear_gateway.py) handles all reads/writes to Linear.
# Dry-run is the default — live writes require MCP_LIVE_WRITE=true.

on:
  repository_dispatch:
    types: [linear-webhook]

  # Manual trigger for testing with a sample payload
  workflow_dispatch:
    inputs:
      action:
        description: 'Linear event action (e.g. Issue.updated, Comment.created)'
        required: true
        type: string
      issue_id:
        description: 'Linear issue identifier (e.g. LAF-7)'
        required: false
        type: string
      dry_run:
        description: 'Dry run only (no live writes)'
        required: false
        default: 'true'
        type: string

jobs:
  route-event:
    name: Route Linear webhook event
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout vault
        uses: actions/checkout@v6

      - name: Setup vault environment
        uses: ./.github/actions/setup-vault
        with:
          python-version: "3.11"
          pip-packages: "PyYAML>=6.0 requests>=2.31"

      - name: Resolve event metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "action=${{ github.event.client_payload.action }}" >> "$GITHUB_OUTPUT"
            echo "issue_id=${{ github.event.client_payload.data.identifier }}" >> "$GITHUB_OUTPUT"
            echo "webhook_id=${{ github.event.client_payload.webhookId }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "action=${{ inputs.action }}" >> "$GITHUB_OUTPUT"
            echo "issue_id=${{ inputs.issue_id }}" >> "$GITHUB_OUTPUT"
            echo "webhook_id=manual-$(date -u +%Y%m%dT%H%M%SZ)" >> "$GITHUB_OUTPUT"
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Summarize incoming event
        run: |
          echo "=== Linear Webhook Event ==="
          echo "action:     ${{ steps.meta.outputs.action }}"
          echo "issue_id:   ${{ steps.meta.outputs.issue_id }}"
          echo "webhook_id: ${{ steps.meta.outputs.webhook_id }}"
          echo "dry_run:    ${{ steps.meta.outputs.dry_run }}"
          echo "==========================="

      # ── Observer: log any issue event to stdout ────────────────────────────
      - name: Observer — read issue state
        if: steps.meta.outputs.issue_id != ''
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          MCP_LIVE_WRITE: "false"
        run: |
          python3 .github/scripts/linear_gateway.py read_issue \
            --issue-id "${{ steps.meta.outputs.issue_id }}" \
            --initiating-agent "github-actions/linear-webhook" \
            --role observer \
            --related-ref "${{ github.ref }}"

      # ── Coordinator: link PR context on Issue.updated ─────────────────────
      - name: Coordinator — link PR context (if PR ref present)
        if: >
          startsWith(steps.meta.outputs.action, 'Issue') &&
          steps.meta.outputs.issue_id != '' &&
          github.event.client_payload.data.branchName != ''
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          MCP_LIVE_WRITE: ${{ steps.meta.outputs.dry_run == 'false' && 'true' || 'false' }}
        run: |
          python3 .github/scripts/linear_gateway.py link_pr_context \
            --issue-id "${{ steps.meta.outputs.issue_id }}" \
            --pr-url "https://github.com/loganfinney27/IDAHO-VAULT/pulls" \
            --pr-title "Branch: ${{ github.event.client_payload.data.branchName }}" \
            --initiating-agent "github-actions/linear-webhook" \
            --role coordinator \
            --related-ref "${{ github.ref }}"

      # ── Secretary: acknowledge comment events ─────────────────────────────
      - name: Secretary — acknowledge comment event (dry run)
        if: startsWith(steps.meta.outputs.action, 'Comment')
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          MCP_LIVE_WRITE: "false"
        run: |
          echo "Comment event received for issue: ${{ steps.meta.outputs.issue_id }}"
          echo "Secretary role acknowledged. No auto-reply without Logan approval."
          python3 .github/scripts/linear_gateway.py read_issue \
            --issue-id "${{ steps.meta.outputs.issue_id }}" \
            --initiating-agent "github-actions/linear-webhook" \
            --role secretary \
            --related-ref "${{ github.ref }}" \
          || true
