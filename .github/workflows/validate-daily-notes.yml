name: Daily Notes Placeholder Check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check-date-placeholders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: Check for unresolved date-placeholder tokens
        shell: bash
        run: |
          set +H  # Disable bash history expansion

          # Determine which files to check. If the diff command fails (e.g. base
          # ref missing from checkout), fall back to the full tree so the check
          # still runs — a silent empty-file-list would make the job pass vacuously.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DIFF_TARGET="origin/${{ github.base_ref }}...HEAD"
          else
            DIFF_TARGET="HEAD~1...HEAD"
          fi

          if ! FILES=$(git -c core.quotePath=false diff --name-only "$DIFF_TARGET" 2>/dev/null); then
            FILES=$(git -c core.quotePath=false ls-tree -r HEAD --name-only)
          fi

          VIOLATIONS=""

          while IFS= read -r filepath; do
            [ -z "$filepath" ] && continue
            [ ! -f "$filepath" ] && continue

            # Scope: daily-note files (YYYY-MM-DD.md at repo root) or TO DO LIST.md
            base=$(basename -- "$filepath")
            dir=$(dirname -- "$filepath")

            scoped=false
            if [ "$dir" = "." ]; then
              if [[ "$base" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}\.md$ ]]; then
                scoped=true
              elif [ "$base" = "TO DO LIST.md" ]; then
                scoped=true
              fi
            fi
            [ "$scoped" = "false" ] && continue

            # Grep for unresolved placeholder tokens with line numbers
            if hits=$(grep -nE '\[\[(YESTERDAY|TOMORROW|TODAY)\]\]' "$filepath"); then
              while IFS= read -r hit; do
                VIOLATIONS="${VIOLATIONS}  ${filepath}:${hit}\n"
              done <<< "$hits"
            fi
          done <<< "$FILES"

          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Unresolved date-placeholder tokens detected in daily notes or TO DO LIST.md"
            echo ""
            echo "These tokens ([[YESTERDAY]], [[TOMORROW]], [[TODAY]]) are syntactically"
            echo "valid wikilinks but resolve to non-existent files. When they land in"
            echo "persistent carryforward surfaces, daily_rollover.py propagates them"
            echo "every run, contaminating subsequent notes."
            echo ""
            echo "Offending lines:"
            echo -e "$VIOLATIONS"
            echo ""
            echo "Fix: either replace with a concrete task or delete the line."
            exit 1
          fi

          echo "No unresolved date-placeholder tokens in daily notes or TO DO LIST.md."

      - name: Check latest daily note against active backlog
        shell: bash
        run: |
          python3 - <<'PY'
          from __future__ import annotations

          import importlib.util
          import re
          import sys
          from pathlib import Path

          root = Path(".")
          todo_file = root / "TO DO LIST.md"
          note_files = sorted(root.glob("????-??-??.md"))

          if not todo_file.exists() or not note_files:
              raise SystemExit(0)

          latest_note = note_files[-1]
          spec = importlib.util.spec_from_file_location(
              "daily_rollover_validation_module",
              root / ".github" / "scripts" / "daily_rollover.py",
          )
          module = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(module)

          active_lines = module.extract_active_section(todo_file.read_text(encoding="utf-8"))
          note_lines = module.extract_todo_section(latest_note.read_text(encoding="utf-8"))
          active_keys = module.todo_task_keys(active_lines, keep_completed=False)
          note_keys = module.todo_task_keys(note_lines, keep_completed=False)
          missing = sorted(active_keys - note_keys)

          if missing:
              preview = ", ".join(missing[:5])
              print(
                  "::error::Latest daily note is missing active carryforward tasks from TO DO LIST.md",
                  file=sys.stderr,
              )
              print(
                  f"Latest note: {latest_note} | Missing normalized task keys: {preview}",
                  file=sys.stderr,
              )
              raise SystemExit(1)

          latest_text = latest_note.read_text(encoding="utf-8")
          if re.search(r"roygbiv-[A-Z][a-z]{2}\b", latest_text):
              print(
                  "::error::Latest daily note still contains template-style mixed-case roygbiv cssclasses",
                  file=sys.stderr,
              )
              print(f"Latest note: {latest_note}", file=sys.stderr)
              raise SystemExit(1)

          print(f"Latest daily note {latest_note} includes the active backlog.")
          PY
