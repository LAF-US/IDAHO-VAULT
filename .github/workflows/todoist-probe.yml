name: Todoist Probe

# Minimum viable round-trip: Actions → Todoist API → commit JSON back.
# Proves the vault can talk to an external service and write the response
# back to itself. Layer a real bridge on top of this once it's green.

on:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1

      - name: Load TODOIST_API_TOKEN from 1Password
        if: env.OP_SERVICE_ACCOUNT_TOKEN != ''
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4
        with:
          export-env: true
        env:
          TODOIST_API_TOKEN: op://vault-operations/todoist-api-token/credential

      - name: Hit GET /rest/v2/tasks and record response
        run: |
          set -euo pipefail
          mkdir -p .github/probes

          if [ -z "${TODOIST_API_TOKEN:-}" ]; then
            jq -n --arg ts "$(date -u +%FT%TZ)" \
                  --arg ref "${{ github.ref_name }}" \
                  --arg run "${{ github.run_id }}" \
                  '{probed_at: $ts, ref: $ref, run_id: $run, status: "skipped", reason: "TODOIST_API_TOKEN not available (OP_SERVICE_ACCOUNT_TOKEN missing or secret not found)"}' \
              > .github/probes/todoist-last-sync.json
            echo "No token — wrote skip marker."
            exit 0
          fi

          HTTP_STATUS=$(curl -sS -o /tmp/todoist_body.json -w "%{http_code}" \
            -H "Authorization: Bearer ${TODOIST_API_TOKEN}" \
            "https://api.todoist.com/rest/v2/tasks")

          if [ "$HTTP_STATUS" != "200" ]; then
            jq -n --arg ts "$(date -u +%FT%TZ)" \
                  --arg ref "${{ github.ref_name }}" \
                  --arg run "${{ github.run_id }}" \
                  --arg status "$HTTP_STATUS" \
                  '{probed_at: $ts, ref: $ref, run_id: $run, status: "error", http_status: $status}' \
              > .github/probes/todoist-last-sync.json
            echo "Todoist API returned $HTTP_STATUS."
            exit 1
          fi

          TASK_COUNT=$(jq 'length' /tmp/todoist_body.json)

          jq -n --arg ts "$(date -u +%FT%TZ)" \
                --arg ref "${{ github.ref_name }}" \
                --arg run "${{ github.run_id }}" \
                --argjson count "$TASK_COUNT" \
                --slurpfile tasks /tmp/todoist_body.json \
                '{probed_at: $ts, ref: $ref, run_id: $run, status: "ok", task_count: $count, tasks: $tasks[0]}' \
            > .github/probes/todoist-last-sync.json

          echo "Fetched $TASK_COUNT task(s)."

      - name: Commit probe artifact back to branch
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .github/probes/todoist-last-sync.json

          if git diff --cached --quiet; then
            echo "No change in probe artifact."
            exit 0
          fi

          git commit -m "probe(todoist): record round-trip at $(date -u +%FT%TZ)"
          git push origin HEAD:${{ github.ref_name }}
