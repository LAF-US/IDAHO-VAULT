name: Review Feedback Loop

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  acknowledge-copilot-apply:
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted workflow surfaces
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Mark PR as waiting on Copilot follow-up
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          python3 .github/scripts/review_feedback_loop.py \
            acknowledge-apply \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            --pr-number "${{ github.event.issue.number }}" \
            --comment-author "${{ github.event.comment.user.login }}" \
            --author-association "${{ github.event.comment.author_association }}" \
            --comment-body "$COMMENT_BODY"

  sweep-review-threads:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted workflow surfaces
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Sweep outdated advisory threads after PR updates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/scripts/review_feedback_loop.py \
            sync-pr \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            --pr-number "${{ github.event.pull_request.number }}" \
            --sync-actor "${{ github.actor }}"
