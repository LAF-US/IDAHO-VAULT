name: PR → Linear Sync

on:
  # Disabled as a direct PR trigger to prevent duplicate owners with
  # .github/workflows/linear-pr-sync.yml (LAF-14 baseline owner).
  workflow_call:
  workflow_dispatch:

jobs:
  sync-pr-state-to-linear:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install 1Password CLI
        run: |
          # The 1Password CLI is already available on GitHub-hosted runners.
          # If you're using a self-hosted runner, you may need to install it.
          # See https://developer.1password.com/docs/cli/get-started/#install
          op --version

      - name: Load Secrets from 1Password
        id: op-load-secrets
        run: |
          # Authenticate to 1Password
          echo "${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}" | op signin --raw

          # Fetch Linear API Key from 1Password
          LINEAR_KEY=$(op read "op://vault-operations/linear-api-key/credential")
          echo "::add-mask::$LINEAR_KEY"
          echo "LINEAR_API_KEY=$LINEAR_KEY" >> $GITHUB_ENV

          # Sign out of 1Password
          op signout
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Sync PR lifecycle to Linear
        env:
          # LINEAR_API_KEY is now set from the previous step
          LINEAR_PR_OPEN_STATE_ID: ${{ secrets.LINEAR_PR_OPEN_STATE_ID }}
          LINEAR_PR_MERGED_STATE_ID: ${{ secrets.LINEAR_PR_MERGED_STATE_ID }}
          LINEAR_POST_LINKBACK: ${{ vars.LINEAR_POST_LINKBACK || 'true' }}
        run: |
          python3 .github/scripts/linear_pr_sync.py
