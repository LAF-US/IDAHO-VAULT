name: Wayback Machine

on:
  push:
    branches: [main]
    paths:
      - 'SOURCES/**'
      - 'GOVERNMENTS/**'
      - 'TOPICS/**'
  schedule:
    - cron: '0 8 * * 1'  # Weekly audit
  workflow_dispatch:
    inputs:
      limit:
        description: 'Limit to N URLs (0 = all)'
        required: false
        default: '0'
      save:
        description: 'Submit dead URLs to Save Page Now'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  preserve:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Preserve new URLs
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Preserve to Wayback Machine
        run: python3 .github/scripts/wayback_preserve.py

  audit:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Audit URLs
        run: |
          python3 .github/scripts/wayback_audit.py \
            --limit "${{ github.event.inputs.limit || '0' }}" \
            --save "${{ github.event.inputs.save || 'false' }}"