name: Secret Pattern Full Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "23 11 * * 1"

permissions:
  contents: read

jobs:
  full-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          lfs: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"

      - name: Scan all tracked files for secret patterns
        shell: bash
        run: |
          git ls-files -z |
            python .github/scripts/check_secret_patterns.py --paths-from-stdin
