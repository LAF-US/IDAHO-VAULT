name: Vault Topology Census

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  workflow_dispatch:

jobs:
  sort-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout vault
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup vault environment
        uses: ./.github/actions/setup-vault
        with:
          pip-packages: "PyYAML>=6.0"

      - name: Run topology census
        run: python3 .github/scripts/topology_census.py --scope all

      - name: Validate census output
        run: |
          git add "!/"
          python3 .github/scripts/validate_content.py --scope admin
          git reset HEAD

      - name: Get census date
        id: date
        run: echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Create topology census pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          branch: bot/topology-census-${{ steps.date.outputs.today }}
          commit-message: "topology census ${{ steps.date.outputs.today }}"
          title: "topology census ${{ steps.date.outputs.today }}"
          body: |
            Automated doctrine-first topology census generated by GitHub Actions.
          add-paths: "!/"
          delete-branch: true
