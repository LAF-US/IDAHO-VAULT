name: Vault Sort Audit

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  workflow_dispatch:

jobs:
  sort-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout vault
        uses: actions/checkout@v6

      - name: Run sort audit
        run: python3 .github/scripts/sort_audit.py

      - name: Validate audit output
        run: |
          git add "!ADMIN/"
          python3 .github/scripts/validate_content.py --scope admin
          git reset HEAD

      - name: Commit audit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "!ADMIN/"
          git diff --cached --quiet || git commit -m "sort audit $(date -u +%Y-%m-%d)"
          git push
