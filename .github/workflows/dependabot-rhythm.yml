name: Dependabot Rhythm

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge-low-risk:
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Summarize decision
        run: |
          {
            echo "## Dependabot Rhythm"
            echo ""
            echo "- Ecosystem: \`${{ steps.metadata.outputs.package-ecosystem }}\`"
            echo "- Update type: \`${{ steps.metadata.outputs.update-type }}\`"
            echo "- Dependency names: \`${{ steps.metadata.outputs.dependency-names }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Approve and enable auto-merge
        if: |
          (steps.metadata.outputs.package-ecosystem == 'pip' || steps.metadata.outputs.package-ecosystem == 'github-actions' || steps.metadata.outputs.package-ecosystem == 'github_actions') &&
          (steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr review --approve "$PR_URL" || true
          gh pr merge --auto --squash --delete-branch "$PR_URL"
