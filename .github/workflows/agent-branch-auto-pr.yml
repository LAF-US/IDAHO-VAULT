name: Agent Branch Auto PR

on: [create, workflow_dispatch]

jobs:
  auto-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Gate on supported branch events
        id: gate
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "create" ]; then
            if [ "${{ github.event.ref_type }}" != "branch" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            BRANCH_NAME="${{ github.event.ref }}"
          else
            BRANCH_NAME="${{ github.ref_name }}"
          fi

          case "$BRANCH_NAME" in
            claude/*|codex/*|gemini/*|copilot/*|perplexity/*|grok/*|serena/*)
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Checkout repo
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
          ref: ${{ steps.gate.outputs.branch_name }}

      - name: Get changed files and classify
        if: steps.gate.outputs.skip != 'true'
        id: classify
        shell: bash
        run: |
          set -euo pipefail

          if ! git merge-base origin/main HEAD >/dev/null 2>&1; then
            echo "No merge base with origin/main; skipping auto-PR for history-rewrite branch."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            {
              echo "### Auto PR skipped"
              echo
              echo "Branch has no merge base with \`origin/main\`; treating this as a history-rewrite branch."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          CHANGED=$(git diff --name-only origin/main...HEAD)
          if [ -z "$CHANGED" ]; then
            echo "No changes vs main"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

          RESULT=$(echo "$CHANGED" | python3 .github/scripts/classify_paths.py)
          TIER=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['tier'])")
          echo "tier=$TIER" >> "$GITHUB_OUTPUT"

          echo "### Changed files" >> "$GITHUB_STEP_SUMMARY"
          echo "$CHANGED" >> "$GITHUB_STEP_SUMMARY"
          echo "### Risk tier: $TIER" >> "$GITHUB_STEP_SUMMARY"

      - name: Check for existing PR
        if: steps.gate.outputs.skip != 'true' && steps.classify.outputs.skip != 'true'
        id: check-pr
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ steps.gate.outputs.branch_name }}
        run: |
          set -euo pipefail
          PR_NUMBER=$(gh pr list --head "$BRANCH_NAME" --state open --json number --jq '.[0].number // empty' 2>/dev/null || true)
          if [ -n "$PR_NUMBER" ]; then
            echo "pr_exists=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          else
            echo "pr_exists=false" >> "$GITHUB_OUTPUT"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure labels exist
        if: steps.gate.outputs.skip != 'true' && steps.classify.outputs.skip != 'true' && steps.check-pr.outputs.pr_exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/scripts/review_feedback_loop.py ensure-labels
          python3 .github/scripts/pr_lifecycle.py ensure-labels

      - name: Create PR
        if: steps.gate.outputs.skip != 'true' && steps.classify.outputs.skip != 'true' && steps.check-pr.outputs.pr_exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RISK_TIER: ${{ steps.classify.outputs.tier }}
          BRANCH_NAME: ${{ steps.gate.outputs.branch_name }}
        shell: bash
        run: |
          set -euo pipefail

          TITLE_BARE=$(echo "$BRANCH_NAME" | sed 's|^[^/]*/||')
          LAST_SEG=$(echo "$TITLE_BARE" | sed 's|^.*-||')
          if [[ "$LAST_SEG" =~ [A-Z0-9] ]]; then
            TITLE=$(echo "$TITLE_BARE" | sed 's|-[^-]*$||' | tr '-' ' ')
          else
            TITLE=$(echo "$TITLE_BARE" | tr '-' ' ')
          fi

          AGENT=$(echo "$BRANCH_NAME" | sed 's|/.*||')
          DIFFSTAT=$(git diff --stat origin/main...HEAD)

          if [ "$RISK_TIER" = "low" ]; then
            LABEL="review/pending"
            LABEL_MARKER="$LABEL"
          else
            LABEL=""
            LABEL_MARKER="none"
          fi

          BODY=$(cat <<EOF
## Auto-generated PR

**Agent:** \`$AGENT\`
**Lifecycle:** \`staged\`
**Label:** \`$LABEL_MARKER\`

### Diff stat
\`\`\`
$DIFFSTAT
\`\`\`

---
*Created by auto-pr workflow*
EOF
)

          CREATE_ARGS=(
            --title "$TITLE"
            --body "$BODY"
            --base main
            --head "$BRANCH_NAME"
            --label "risk/$RISK_TIER"
          )
          if [ -n "$LABEL" ]; then
            CREATE_ARGS+=(--label "$LABEL")
          fi

          gh pr create "${CREATE_ARGS[@]}"

      - name: Mark PR lifecycle as staged
        if: steps.gate.outputs.skip != 'true' && steps.classify.outputs.skip != 'true' && steps.check-pr.outputs.pr_exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ steps.gate.outputs.branch_name }}
        shell: bash
        run: |
          set -euo pipefail
          PR_NUM=$(gh pr list --head "$BRANCH_NAME" --state open --json number --jq '.[0].number // empty' 2>/dev/null || true)
          if [ -z "$PR_NUM" ] || ! [[ "$PR_NUM" =~ ^[0-9]+$ ]]; then
            echo "No open PR found to mark lifecycle state on"
            exit 0
          fi
          python3 .github/scripts/pr_lifecycle.py set-state --pr-number "$PR_NUM" --state staged

      - name: Log grace period start
        if: steps.gate.outputs.skip != 'true' && steps.classify.outputs.skip != 'true' && steps.check-pr.outputs.pr_exists != 'true' && steps.classify.outputs.tier == 'low'
        shell: bash
        run: |
          echo "Lifecycle set to \`lifecycle/staged\`." >> "$GITHUB_STEP_SUMMARY"
          echo "Low-risk PR created with \`review/pending\`." >> "$GITHUB_STEP_SUMMARY"
          echo "Auto-merge is gated: the agent-review-gate workflow will promote to \`merge/auto\` after a 30-minute review grace period if no blocking feedback appears." >> "$GITHUB_STEP_SUMMARY"
