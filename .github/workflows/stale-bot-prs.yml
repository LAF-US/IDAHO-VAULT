name: Stale Bot PR Cleanup

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Close stale bot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/stale_bot_prs.py \
            --apply \
            --age-days 2 \
            --report-path stale-bot-prs.md

      - name: Publish summary
        run: cat stale-bot-prs.md >> "$GITHUB_STEP_SUMMARY"
