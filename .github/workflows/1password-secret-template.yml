name: 1Password Secret Injection Template

# This is a TEMPLATE workflow showing how to use 1Password in GitHub Actions.
# Keep it manual unless you intentionally want it to run on every push.

on:
  workflow_dispatch:

jobs:
  use-1password-secrets:
    runs-on: ubuntu-latest
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Load Secrets from 1Password
        if: env.OP_SERVICE_ACCOUNT_TOKEN != ''
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4
        with:
          export-env: true
        env:
          GITHUB_PAT: op://vault-operations/github-personal-access-token/password
          LINEAR_API_KEY: op://vault-operations/linear-api-key/credential

      - name: Skip 1Password load when token is missing
        if: env.OP_SERVICE_ACCOUNT_TOKEN == ''
        run: |
          echo "OP_SERVICE_ACCOUNT_TOKEN is not configured; skipping 1Password secret load."
          echo "GITHUB_PAT=" >> "$GITHUB_ENV"
          echo "LINEAR_API_KEY=" >> "$GITHUB_ENV"

      - name: Example API Call with Secrets
        if: env.GITHUB_PAT != ''
        run: |
          curl -s -H "Authorization: token ${{ env.GITHUB_PAT }}" \
            https://api.github.com/user \
            | head -20

# ============================================================================
# NOTES FOR IMPLEMENTATION:
# ============================================================================
#
# 1. GitHub Secrets Required:
#    - OP_SERVICE_ACCOUNT_TOKEN: Service account token from 1Password
#
# 2. 1Password Secret References Expected:
#    - op://vault-operations/github-personal-access-token/password
#    - op://vault-operations/linear-api-key/credential
#    - Add more items as needed
#
# 3. Error Handling:
#    - The 1Password action loads secrets into environment variables for you
#    - Check for empty variables before use
#    - Secrets are masked in logs by the action
#
# 4. Best Practices:
#    - Keep the workflow manual unless you really want it to run on every push
#    - Use specific secret names to avoid typos
#    - Document which secrets each workflow requires
#
# 5. Testing:
#    - Manually test 1Password access from your machine:
#      `op read "op://vault-operations/github-personal-access-token/password"`
#    - Run this workflow from the Actions tab after setting OP_SERVICE_ACCOUNT_TOKEN
#
# 6. Security:
#    - OP_SERVICE_ACCOUNT_TOKEN is the only GitHub Secret
#    - All other secrets are fetched via 1Password secret references at runtime
#    - Rotate OP_SERVICE_ACCOUNT_TOKEN regularly (90 days)
